<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Demand Forecasting Dashboard</title>
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <h1>Sales Demand Forecasting Dashboard</h1>
        <p>Frontend on Vercel • Backend on Render</p>
      </header>

      <main class="container">
        <section class="panel">
          <h2>Historical Sales Trend</h2>
          <canvas id="historicalChart"></canvas>
        </section>

        <section class="panel">
          <h2>Model Used</h2>
          <p id="modelName">Linear Regression</p>
          <div class="metrics">
            <div class="metric">
              <span>MAE</span>
              <strong id="maeValue">-</strong>
            </div>
            <div class="metric">
              <span>RMSE</span>
              <strong id="rmseValue">-</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Future Sales Prediction</h2>
          <label for="daysRange">Select number of days to forecast: <span id="daysLabel">30</span></label>
          <input id="daysRange" type="range" min="7" max="90" value="30" />
          <canvas id="forecastChart"></canvas>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
